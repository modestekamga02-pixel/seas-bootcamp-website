<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | SEAS Showcase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { padding: 50px; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(255,255,255,0.1); }
        th, td { padding: 15px; border: 1px solid #444; text-align: left; }
        th { background: #008080; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Ceremony Registration List</h1>
        <p>Total Participants recorded in Cloud: <span id="count">0</span></p>
        
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Role</th>
                </tr>
            </thead>
            <tbody id="registrationData">
                </tbody>
        </table>
    </div>

    <script>
        const supabaseUrl = 'https://euioymukroosxtguynxq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1aW95bXVrcm9vc3h0Z3V5bnhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzQ4NDksImV4cCI6MjA5MTc1MDg0OX0.-6hehGuRTVM8sACuxikzvKtL0s2x-TdCvzkvRDuCSss';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function fetchRegistrations() {
            const { data, error } = await _supabase
                .from('registrations')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error fetching data:', error);
            } else {
                const tableBody = document.getElementById('registrationData');
                document.getElementById('count').innerText = data.length;
                
                tableBody.innerHTML = data.map(reg => `
                    <tr>
                        <td>${new Date(reg.created_at).toLocaleDateString()}</td>
                        <td>${reg.full_name}</td>
                        <td>${reg.email}</td>
                        <td>${reg.role}</td>
                    </tr>
                `).join('');
            }
        }

        fetchRegistrations();
    </script>
</body>
</html>
